<app-navbar></app-navbar>

<div class="container">
  <mat-card class="card-perfil">

    <mat-card-title class="titulo-perfil">
      <mat-icon>account_circle</mat-icon>
      Meu Perfil
    </mat-card-title>

    <mat-card-content>

      <div class="info-perfil">
        <mat-icon>person</mat-icon>
        <p>
          <strong>Nome:</strong>
          <span class="valor">{{ nomeUsuario() }}</span>
        </p>
      </div>

      <div class="info-perfil">
        <mat-icon>email</mat-icon>
        <p>
          <strong>Email:</strong>
          <span class="valor">{{ email }}</span>
        </p>
      </div>

      <div class="info-perfil">
        <mat-icon>badge</mat-icon>
        <p>
          <strong>Tipo de Usuário:</strong>
          <span class="valor">{{ tipoUsuario }}</span>
        </p>
      </div>

      <hr>

      @if (!editandoNome) {

      <div class="acoes">
        <button mat-raised-button color="primary" (click)="editarNome()">
          Editar Nome
        </button>
      </div>

      } @else {

      <h3>Atualizar Nome</h3>

      <mat-form-field appearance="outline" class="campo">
        <mat-label>Novo Nome</mat-label>

        <input matInput type="text" [(ngModel)]="novoNome" />
      </mat-form-field>

      <div class="acoes">
        <button mat-raised-button color="primary" (click)="atualizarNome()">
          Salvar
        </button>

        <button mat-button type="button" (click)="cancelarEdicao()">
          Cancelar
        </button>
      </div>

      }

    </mat-card-content>

  </mat-card>
</div>
